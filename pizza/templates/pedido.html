{% extends 'base/base.html' %}
{% load static %}

{% block 'cabecalho' %}
    <link href="{% static 'homepage/css/homepage.css' %}" rel="stylesheet">
    <link href="{% static 'pizza/css/pedido.css' %}" rel="stylesheet">
{% endblock %}

{% block 'conteudo' %}
<div class="container">
    <h1>Pedido</h1>

    {% if messages %}
        {% for message in messages %}
            <section class='alert {{message.tags}}'>
                {{message}}
            </section>
        {% endfor %}
    {% endif %}

    <br>
    <form action="{% url "pedido" %}" method="POST">{% csrf_token %}
        <label>Nome</label>
        <input type="text" class="input-form" name="nome" id="">
        <br>
        <br>
        <br>

        <label for="">Tamanho</label>
        <select name="tamanho" class="input-form">
            {% for t in tamanho %}
                <option value='{{t.0}}'>
                    {{t.1}}
                </option>
            {% endfor %}
        </select>
        <br>
        <br>
        <br>

       
        <label>Escolha os sabores</label>
        <br>
        {% for s in sabores %}
            <input type="checkbox" value="{{ s.id }}" name="sabores" id="{{s.id}}">
            <label for="{{ s.id }}">{{ s.nome }}</label>
            <br>
        {% endfor %}
        
        
        
        <br>
        <br>
        <br>

        <input type="submit" value="Fechar Pedido" class="btn-cadastro">

        <br>
        <br>
        <br>
        <br>
    </form>
</div>

    
{% endblock 'conteudo' %}
